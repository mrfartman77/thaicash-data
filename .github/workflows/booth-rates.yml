name: booth-rates

on:
  schedule:
    # Hourly, 01:07–13:07 UTC = 08:07–20:07 Bangkok (booth business hours).
    # Dense on purpose: GitHub fires schedule events 1.5–4h late on the shared
    # queue, so more slots = the first morning scrape lands sooner and any
    # load-shedded slot matters less.
    - cron: "7 1-13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape booth rates
        run: python3 scrapers/booth_rates.py

      - name: Commit if changed
        run: |
          git config user.name "booth-rates-bot"
          git config user.email "actions@github.com"
          git add data/booth-rates.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "booth rates $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

name: rates

on:
  schedule:
    # Hourly around the clock: crypto books trade 24/7 and the app's users
    # are often a dozen time zones from Bangkok. The booth scrapers ride
    # along harmlessly overnight (boards just don't change). Dense on
    # purpose: GitHub fires schedule events 1.5–4h late on the shared queue,
    # so more slots = fresher data and any load-shedded slot matters less.
    - cron: "7 * * * *"
  workflow_dispatch: {}

# The Cloudflare Worker cron (infra/worker.js) dispatches this workflow
# punctually every hour; GitHub's own schedule stays as a backup. Serialize
# so an external dispatch and a late-fired schedule slot never race the
# commit/push step.
concurrency:
  group: booth-rates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape booth rates
        run: python3 scrapers/booth_rates.py

      - name: Scrape crypto rates
        # continue-on-error: an all-venues-down hour shouldn't block the
        # booth feed commit; the scraper keeps the last good file itself.
        continue-on-error: true
        run: python3 scrapers/crypto_rates.py

      - name: Commit if changed
        run: |
          git config user.name "rates-bot"
          git config user.email "actions@github.com"
          git add data/booth-rates.json data/crypto-rates.json
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "rates $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
